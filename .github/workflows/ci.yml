name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm -r run test

  release-please:
    needs: [check]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      releases: ${{ toJSON(steps.release.outputs) }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Publish released packages
        env:
          RELEASES: ${{ needs.release-please.outputs.releases }}
        run: |
          publish_if_released() {
            local path="$1" filter="$2"
            if [ "$(echo "$RELEASES" | jq -r ".\"${path}--release_created\" // \"false\"")" = "true" ]; then
              echo "::group::Publishing $filter"
              pnpm --filter "$filter" publish --access public --no-git-checks --provenance
              echo "::endgroup::"
            fi
          }

          publish_if_released "packages/pi-anthropic-auth" "@gotgenes/pi-anthropic-auth"
          publish_if_released "packages/pi-autoformat" "@gotgenes/pi-autoformat"
          publish_if_released "packages/pi-github-tools" "@gotgenes/pi-github-tools"
          publish_if_released "packages/pi-permission-system" "@gotgenes/pi-permission-system"
          publish_if_released "packages/pi-subagents" "@gotgenes/pi-subagents"
