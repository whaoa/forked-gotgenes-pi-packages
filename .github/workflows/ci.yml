name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm -r run test

      - name: Fallow audit
        if: github.event_name == 'pull_request'
        run: pnpm fallow audit

      - name: Fallow dead-code gate
        if: github.ref == 'refs/heads/main'
        run: pnpm fallow dead-code

      - name: Fallow full report
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: pnpm fallow

  release-please:
    needs: [check]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      releases: ${{ toJSON(steps.release.outputs) }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Publish released packages
        env:
          RELEASES: ${{ needs.release-please.outputs.releases }}
        run: ./scripts/publish-released.sh
