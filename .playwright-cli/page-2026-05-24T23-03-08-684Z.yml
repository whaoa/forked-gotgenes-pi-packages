      - text: "#"
    - text: Architecture
  - paragraph [ref=e10]: "This document describes the architecture of the pi-subagents fork: a focused, composable core with a stable API boundary that other extensions can build on."
  - heading "Design principles" [level=2] [ref=e11]:
    - link [ref=e12] [cursor=pointer]:
      - /url: "#design-principles"
      - text: "#"
    - text: Design principles
  - list [ref=e13]:
    - listitem [ref=e14]:
      - strong [ref=e15]: Narrow core
      - text: — the extension owns agent spawning, execution, and result retrieval. Everything else is a consumer.
    - listitem [ref=e16]:
      - strong [ref=e17]: Composable by default
      - text: — other extensions can spawn agents, observe their lifecycle, and display their state without importing this package directly.
    - listitem [ref=e18]:
      - strong [ref=e19]: Typed API boundary
      - text: — this package exports a
      - code [ref=e20]: SubagentsService
      - text: interface and
      - code [ref=e21]: Symbol.for()
      - text: accessors (
      - code [ref=e22]: publishSubagentsService
      - text: /
      - code [ref=e23]: getSubagentsService
      - text: ). Consumers declare this package as an optional peer dependency and use dynamic import for compile-time types. The runtime bridge is
      - code [ref=e24]: Symbol.for("@gotgenes/pi-subagents:service")
      - text: "on"
      - code [ref=e25]: globalThis
      - text: — no separate API package.
    - listitem [ref=e26]:
      - strong [ref=e27]: No scheduling
      - text: — in-process scheduling is removed from the core. Scheduling is a separate concern that any extension can implement by calling
      - code [ref=e28]: spawn()
      - text: on the published API.
    - listitem [ref=e29]:
      - strong [ref=e30]: UI extraction is deferred
      - text: — the widget, conversation viewer, and
      - code [ref=e31]: /agents
      - text: command menu stay in the core for now. They are the first candidate for extraction once the API boundary is proven stable.
    - listitem [ref=e32]:
      - strong [ref=e33]: Snapshot, don't capture
      - text: — mutable parent state (ctx, session, model) is read once at spawn time and frozen into a
      - code [ref=e34]: ParentSnapshot
      - text: data object. No live references survive past the spawn call.
    - listitem [ref=e35]:
      - strong [ref=e36]: Subscribe, don't thread
      - text: — observation of agent progress uses direct session-event subscription, not callback parameters threaded through multiple layers.
    - listitem [ref=e37]:
      - strong [ref=e38]: Construct complete
      - text: — objects are born with all their dependencies. If state isn't available yet, the object that needs it doesn't exist yet. No post-construction field writes from external code — if an object can't be instantiated ready-to-go, the prep work hasn't been done and the right dependencies haven't been identified.
    - listitem [ref=e39]:
      - strong [ref=e40]: State owns its mutations
      - text: — mutable state lives in a class whose methods enforce valid transitions and invariants. Free functions that mutate module-scoped variables, closure-captured bags-of-functions, and external writes to shared interfaces are replaced by classes that encapsulate the state they manage.
