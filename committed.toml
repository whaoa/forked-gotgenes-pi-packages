# Configuration for `committed`, the commit-message linter wired as a `prek`
# `commit-msg` hook (see prek.toml). Rationale: docs/decisions/0001-commit-message-linter.md.
style = "conventional"
subject_capitalized = false
imperative_subject = false
subject_length = 120
line_length = 0
allowed_types = ["feat", "fix", "perf", "revert", "docs", "style", "chore", "refactor", "test", "build", "ci"]
